services:
  api:
   build: .
   ports:
    - "8000:8000"
   env_file:
    - .env
   depends_on:
    - qdrant
   volumes:
    - ./data:/app/data
    
  qdrant:
   image: qdrant/qdrant:latest
   ports:
    - "6333:6333"
    - "6334:6334"
   volumes:
    - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage: